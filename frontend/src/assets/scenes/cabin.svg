<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Wall gradient: warmer near lamp, darker at edges -->
    <radialGradient id="wallLight" cx="62%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#3a2618" />
      <stop offset="45%" stop-color="#221710" />
      <stop offset="100%" stop-color="#0e0b08" />
    </radialGradient>
    <!-- Night sky -->
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06060f" />
      <stop offset="60%" stop-color="#0e0a1f" />
      <stop offset="100%" stop-color="#1d1228" />
    </linearGradient>
    <!-- Distant city glow -->
    <linearGradient id="cityHorizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(245,166,35,0)" />
      <stop offset="100%" stop-color="rgba(245,166,35,0.35)" />
    </linearGradient>
    <!-- Desk wood -->
    <linearGradient id="deskTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e4029" />
      <stop offset="40%" stop-color="#4a3220" />
      <stop offset="100%" stop-color="#2c1d12" />
    </linearGradient>
    <linearGradient id="deskFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2918" />
      <stop offset="100%" stop-color="#1a110a" />
    </linearGradient>
    <!-- Lamp glow -->
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(245,166,35,0.7)" />
      <stop offset="25%" stop-color="rgba(245,166,35,0.32)" />
      <stop offset="65%" stop-color="rgba(245,166,35,0.08)" />
      <stop offset="100%" stop-color="rgba(245,166,35,0)" />
    </radialGradient>
    <!-- Plant leaf -->
    <radialGradient id="leaf" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#5a8a5a" />
      <stop offset="100%" stop-color="#2d4a30" />
    </radialGradient>
    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="55%" r="65%">
      <stop offset="50%" stop-color="rgba(0,0,0,0)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)" />
    </radialGradient>
    <!-- Floor -->
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1c12" />
      <stop offset="100%" stop-color="#0c0805" />
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <!-- ============== BACK WALL ============== -->
  <rect x="0" y="0" width="800" height="430" fill="url(#wallLight)" />

  <!-- Skirting board -->
  <rect x="0" y="420" width="800" height="14" fill="#1a1108" />
  <rect x="0" y="430" width="800" height="2" fill="rgba(245,166,35,0.18)" />

  <!-- ============== FLOOR ============== -->
  <rect x="0" y="430" width="800" height="170" fill="url(#floor)" />
  <!-- Floor perspective lines -->
  <line x1="0"   y1="600" x2="280" y2="430" stroke="#1a1208" stroke-width="1" opacity="0.5" />
  <line x1="200" y1="600" x2="350" y2="430" stroke="#1a1208" stroke-width="1" opacity="0.4" />
  <line x1="800" y1="600" x2="520" y2="430" stroke="#1a1208" stroke-width="1" opacity="0.5" />
  <line x1="600" y1="600" x2="450" y2="430" stroke="#1a1208" stroke-width="1" opacity="0.4" />

  <!-- ============== WINDOW ============== -->
  <g transform="translate(80,70)">
    <!-- Frame -->
    <rect x="-6" y="-6" width="332" height="232" rx="3" fill="#2a1c14" />
    <rect x="0"  y="0"  width="320" height="220" fill="url(#nightSky)" />
    <!-- Distant city glow at horizon -->
    <rect x="0" y="160" width="320" height="60" fill="url(#cityHorizon)" />

    <!-- City buildings silhouette -->
    <g fill="#0a0610">
      <rect x="6"   y="120" width="22" height="80" />
      <rect x="32"  y="140" width="18" height="60" />
      <rect x="52"  y="110" width="28" height="90" />
      <rect x="84"  y="135" width="20" height="65" />
      <rect x="108" y="105" width="32" height="95" />
      <rect x="144" y="130" width="24" height="70" />
      <rect x="172" y="115" width="26" height="85" />
      <rect x="202" y="138" width="20" height="62" />
      <rect x="226" y="120" width="30" height="80" />
      <rect x="260" y="132" width="22" height="68" />
      <rect x="286" y="118" width="28" height="82" />
    </g>

    <!-- City light dots (windows in buildings) -->
    <g fill="#f5a623">
      <rect x="10"  y="135" width="2" height="2" />
      <rect x="20"  y="155" width="2" height="2" />
      <rect x="38"  y="160" width="2" height="2" opacity="0.8"/>
      <rect x="44"  y="180" width="2" height="2" />
      <rect x="58"  y="125" width="2" height="2" />
      <rect x="64"  y="140" width="2" height="2" opacity="0.7"/>
      <rect x="70"  y="170" width="2" height="2" />
      <rect x="92"  y="150" width="2" height="2" />
      <rect x="98"  y="180" width="2" height="2" opacity="0.8"/>
      <rect x="116" y="130" width="2" height="2" />
      <rect x="124" y="148" width="2" height="2" />
      <rect x="132" y="170" width="2" height="2" opacity="0.7"/>
      <rect x="150" y="155" width="2" height="2" />
      <rect x="160" y="180" width="2" height="2" />
      <rect x="178" y="135" width="2" height="2" opacity="0.8"/>
      <rect x="186" y="160" width="2" height="2" />
      <rect x="208" y="160" width="2" height="2" opacity="0.7"/>
      <rect x="232" y="140" width="2" height="2" />
      <rect x="244" y="170" width="2" height="2" />
      <rect x="252" y="155" width="2" height="2" opacity="0.8"/>
      <rect x="266" y="155" width="2" height="2" />
      <rect x="292" y="138" width="2" height="2" />
      <rect x="298" y="170" width="2" height="2" opacity="0.7"/>
    </g>

    <!-- A few stars -->
    <g fill="#fff5e4" opacity="0.7">
      <circle cx="40"  cy="22" r="0.8" />
      <circle cx="92"  cy="45" r="0.6" />
      <circle cx="155" cy="18" r="0.9" />
      <circle cx="220" cy="35" r="0.7" />
      <circle cx="270" cy="22" r="0.8" />
      <circle cx="310" cy="50" r="0.6" />
    </g>

    <!-- Cross mullion -->
    <rect x="158" y="0" width="4" height="220" fill="#2a1c14" />
    <rect x="0" y="108" width="320" height="4" fill="#2a1c14" />

    <!-- Windowsill -->
    <rect x="-12" y="220" width="344" height="8" fill="#1a1108" />
    <rect x="-12" y="226" width="344" height="2" fill="rgba(245,166,35,0.12)" />
  </g>

  <!-- ============== AWARDS / CERTIFICATES ON WALL ============== -->
  <g transform="translate(480,90)">
    <!-- Frame 1 -->
    <rect x="0" y="0" width="80" height="55" fill="#1a1108" stroke="#f5c842" stroke-width="2" />
    <rect x="6" y="6" width="68" height="34" fill="#2a1c14" />
    <text x="40" y="22" text-anchor="middle" fill="#f5c842" font-family="serif" font-size="8" font-style="italic">NxtCorp</text>
    <text x="40" y="34" text-anchor="middle" fill="#f0e6d3" font-family="serif" font-size="6">Top Manager 2025</text>
    <!-- gold seal -->
    <circle cx="40" cy="48" r="3" fill="#f5c842" />

    <!-- Frame 2 -->
    <g transform="translate(110,8)">
      <rect x="0" y="0" width="70" height="45" fill="#1a1108" stroke="#8a7a6a" stroke-width="1.5" />
      <rect x="4" y="4" width="62" height="28" fill="#2a1c14" />
      <text x="35" y="20" text-anchor="middle" fill="#f0e6d3" font-family="serif" font-size="7">CERTIFICATE</text>
      <text x="35" y="29" text-anchor="middle" fill="#8a7a6a" font-family="serif" font-size="5">of Excellence</text>
    </g>

    <!-- Wall logo "NxtCorp" -->
    <g transform="translate(40,80)">
      <text x="50" y="0" text-anchor="middle" fill="#f5c842" font-family="serif" font-size="16" letter-spacing="2" opacity="0.85">NxtCorp</text>
      <text x="50" y="14" text-anchor="middle" fill="#8a7a6a" font-family="sans-serif" font-size="6" letter-spacing="4">EST · HYDERABAD</text>
    </g>
  </g>

  <!-- ============== PLANT IN CORNER ============== -->
  <g transform="translate(700,300)">
    <!-- Pot -->
    <path d="M -22 60 L -18 28 L 18 28 L 22 60 Z" fill="#3d2918" stroke="#1a1108" stroke-width="1" />
    <ellipse cx="0" cy="28" rx="20" ry="4" fill="#5a3f2e" />
    <!-- Soil -->
    <ellipse cx="0" cy="28" rx="18" ry="2.5" fill="#1a1108" />
    <!-- Leaves -->
    <g fill="url(#leaf)" stroke="#1a2a1a" stroke-width="0.5">
      <path d="M 0 28 Q -8 0 -14 -22 Q -18 -32 -10 -36 Q -2 -34 -2 -22 Q -2 0 0 28 Z" />
      <path d="M 0 28 Q 6 -4 14 -22 Q 22 -34 18 -42 Q 8 -42 4 -26 Q 0 -4 0 28 Z" />
      <path d="M 0 28 Q -2 -8 -2 -30 Q 0 -44 6 -44 Q 12 -42 8 -24 Q 4 -4 0 28 Z" opacity="0.9" />
      <path d="M 0 28 Q -10 4 -20 -10 Q -28 -22 -22 -28 Q -14 -28 -10 -16 Q -4 0 0 28 Z" opacity="0.85" />
      <path d="M 0 28 Q 12 6 22 -8 Q 28 -16 22 -22 Q 14 -22 10 -10 Q 4 4 0 28 Z" opacity="0.85" />
    </g>
  </g>

  <!-- ============== LAMP GLOW HALO (behind desk objects) ============== -->
  <circle cx="240" cy="430" r="220" fill="url(#lampGlow)" />
  <circle cx="240" cy="430" r="340" fill="url(#lampGlow)" opacity="0.4" />

  <!-- ============== DESK ============== -->
  <!-- Desk top (perspective trapezoid) -->
  <polygon points="40,440 760,440 720,520 80,520" fill="url(#deskTop)" />
  <!-- Top edge highlight (where lamp catches it) -->
  <polygon points="40,440 760,440 758,444 42,444" fill="rgba(245,166,35,0.35)" />
  <!-- Desk front face -->
  <polygon points="80,520 720,520 700,560 100,560" fill="url(#deskFront)" />
  <!-- Wood grain hints on top -->
  <line x1="120" y1="465" x2="680" y2="465" stroke="#2c1d12" stroke-width="1" opacity="0.5" />
  <line x1="160" y1="490" x2="640" y2="490" stroke="#2c1d12" stroke-width="1" opacity="0.4" />
  <line x1="200" y1="500" x2="600" y2="500" stroke="#3d2918" stroke-width="0.6" opacity="0.5" />

  <!-- ============== LAPTOP ============== -->
  <g transform="translate(420,415)">
    <!-- closed laptop lid (back view, slightly open) -->
    <polygon points="0,30 130,30 130,0 0,0" fill="#1a1510" />
    <polygon points="0,30 130,30 134,38 -4,38" fill="#2a1f15" />
    <!-- subtle Apple-style logo position blank -->
    <rect x="55" y="10" width="20" height="10" fill="rgba(245,166,35,0.08)" rx="2" />
  </g>

  <!-- ============== PAPERS + COFFEE MUG ============== -->
  <!-- Papers stack -->
  <g transform="translate(580,440)">
    <rect x="0" y="-2" width="60" height="40" fill="#e8dcc0" stroke="#1a1108" stroke-width="0.5" transform="rotate(-3)" />
    <rect x="2" y="0" width="58" height="38" fill="#f0e6d3" stroke="#1a1108" stroke-width="0.5" />
    <line x1="8" y1="8" x2="50" y2="8" stroke="#3d2918" stroke-width="0.4" />
    <line x1="8" y1="14" x2="46" y2="14" stroke="#3d2918" stroke-width="0.4" />
    <line x1="8" y1="20" x2="48" y2="20" stroke="#3d2918" stroke-width="0.4" />
    <line x1="8" y1="26" x2="42" y2="26" stroke="#3d2918" stroke-width="0.4" />
    <line x1="8" y1="32" x2="45" y2="32" stroke="#3d2918" stroke-width="0.4" />
  </g>

  <!-- Coffee mug -->
  <g transform="translate(670,430)">
    <ellipse cx="14" cy="0" rx="14" ry="3.5" fill="#3d2918" />
    <path d="M 0 0 L 4 30 L 24 30 L 28 0 Z" fill="#8a5a3a" />
    <ellipse cx="14" cy="0" rx="13" ry="3" fill="#1a1108" />
    <ellipse cx="14" cy="-1" rx="10" ry="1.6" fill="#3a1f10" />
    <!-- handle -->
    <path d="M 28 8 Q 38 12 36 20 Q 32 26 24 24" fill="none" stroke="#8a5a3a" stroke-width="3" />
    <!-- steam -->
    <path d="M 10 -8 Q 8 -16 12 -20 Q 16 -24 14 -32" stroke="#f0e6d3" stroke-width="1" fill="none" opacity="0.35" />
    <path d="M 18 -8 Q 20 -14 18 -20 Q 16 -26 20 -32" stroke="#f0e6d3" stroke-width="1" fill="none" opacity="0.3" />
  </g>

  <!-- ============== DESK LAMP ============== -->
  <g transform="translate(200,360)">
    <!-- base -->
    <ellipse cx="0" cy="80" rx="20" ry="5" fill="#1a1108" />
    <rect x="-14" y="74" width="28" height="6" rx="2" fill="#2a1c14" />
    <!-- jointed arm -->
    <line x1="0"   y1="74" x2="-6" y2="40" stroke="#3d2918" stroke-width="4" />
    <circle cx="-6" cy="40" r="3" fill="#1a1108" />
    <line x1="-6"  y1="40" x2="14" y2="14" stroke="#3d2918" stroke-width="4" />
    <circle cx="14" cy="14" r="3" fill="#1a1108" />
    <!-- shade -->
    <path d="M 14 14 L 40 -4 L 50 18 L 24 30 Z" fill="#3d2918" stroke="#1a1108" stroke-width="1" />
    <!-- inner shade glow -->
    <path d="M 24 30 L 50 18 L 48 20 L 26 32 Z" fill="#f5a623" />
    <!-- bulb glow -->
    <ellipse cx="34" cy="24" rx="14" ry="6" fill="rgba(245,166,35,0.9)" filter="url(#strongGlow)" />
  </g>

  <!-- ============== PRIYA (silhouette + chair) ============== -->
  <g transform="translate(350,300)">
    <!-- Chair back -->
    <rect x="-50" y="50" width="100" height="80" rx="14" fill="#1a1108" />
    <rect x="-46" y="56" width="92" height="60" rx="10" fill="#3d2918" opacity="0.7" />

    <!-- Body (blazer) -->
    <path d="M -42 100 Q -42 70 0 65 Q 42 70 42 100 L 50 160 L -50 160 Z" fill="#2a3545" />
    <!-- Collar / shirt -->
    <path d="M -8 90 L 0 70 L 8 90 L 4 110 L -4 110 Z" fill="#f0e6d3" />
    <!-- Blazer lapels -->
    <path d="M -12 90 L -28 130 L -14 110 Z" fill="#1f2735" />
    <path d="M 12 90 L 28 130 L 14 110 Z" fill="#1f2735" />

    <!-- Neck -->
    <rect x="-7" y="50" width="14" height="22" fill="#c8845a" />

    <!-- Head -->
    <circle cx="0" cy="36" r="32" fill="#c8845a" />
    <!-- Hair (bun at back + part on side) -->
    <path d="M -32 30 Q -32 4 0 0 Q 32 4 32 30 L 32 36 Q 26 14 0 14 Q -26 14 -32 36 Z" fill="#1a0f0a" />
    <circle cx="-4" cy="-2" r="9" fill="#1a0f0a" />

    <!-- Ears -->
    <ellipse cx="-30" cy="38" rx="3" ry="4" fill="#c8845a" />
    <ellipse cx="30"  cy="38" rx="3" ry="4" fill="#c8845a" />

    <!-- Brows -->
    <path d="M -16 30 L -8 28" stroke="#1a0f0a" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 8 28 L 16 30"   stroke="#1a0f0a" stroke-width="2.5" stroke-linecap="round" />

    <!-- Glasses -->
    <g stroke="#1a0f0a" stroke-width="1.5" fill="none">
      <rect x="-18" y="34" width="14" height="10" rx="2" />
      <rect x="4"   y="34" width="14" height="10" rx="2" />
      <line x1="-4" y1="39" x2="4" y2="39" />
    </g>
    <!-- Eyes behind glasses -->
    <ellipse cx="-11" cy="39" rx="2.5" ry="2.8" fill="#1a0f0a" />
    <ellipse cx="11"  cy="39" rx="2.5" ry="2.8" fill="#1a0f0a" />
    <circle cx="-12" cy="38" r="0.7" fill="#fff5e4" />
    <circle cx="10"  cy="38" r="0.7" fill="#fff5e4" />

    <!-- Nose -->
    <circle cx="0" cy="46" r="0.8" fill="#8a4f2a" opacity="0.5" />

    <!-- Mouth (warm smile) -->
    <path d="M -8 52 Q 0 58 8 52" stroke="#1a0f0a" stroke-width="2" stroke-linecap="round" fill="none" />

    <!-- Blush -->
    <ellipse cx="-22" cy="47" rx="3" ry="2" fill="#e89270" opacity="0.5" />
    <ellipse cx="22"  cy="47" rx="3" ry="2" fill="#e89270" opacity="0.5" />

    <!-- Lamp light highlight on cheek + hair -->
    <ellipse cx="14" cy="40" rx="12" ry="14" fill="rgba(245,166,35,0.15)" />
    <ellipse cx="20" cy="20" rx="14" ry="10" fill="rgba(245,166,35,0.2)" />
  </g>

  <!-- ============== TICKET ON DESK CORNER ============== -->
  <g transform="translate(580,520) rotate(-4)">
    <rect x="0" y="0" width="80" height="22" fill="#f5c842" />
    <rect x="3" y="3" width="74" height="16" fill="#f5a623" />
    <text x="40" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#1a1108" letter-spacing="2">NEW TICKET</text>
  </g>

  <!-- ============== ATMOSPHERIC OVERLAY ============== -->
  <rect x="0" y="0" width="800" height="600" fill="url(#vignette)" />
  <!-- subtle blue light from window -->
  <ellipse cx="200" cy="240" rx="220" ry="110" fill="rgba(122,154,184,0.06)" />
</svg>
