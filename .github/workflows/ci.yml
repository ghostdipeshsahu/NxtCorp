name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (no-LLM tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # These three suites don't require ANTHROPIC_API_KEY (no LLM calls).
      # They cover the executor, progression system, and story engine — the
      # bulk of the deterministic backend logic.
      - name: Run executor tests (step 2)
        run: python -m scripts.test_step2

      - name: Run progression tests (step 9)
        run: python -m scripts.test_step9

      - name: Run story engine tests (step 10)
        run: python -m scripts.test_step10

      - name: Run author offline tests (step 11)
        run: python -m scripts.test_step11

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
