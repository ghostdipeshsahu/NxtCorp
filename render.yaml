# Render blueprint — deploys the FastAPI backend as a FREE web service.
# Database is NOT provisioned here (Render's Postgres requires payment after
# 90 days). Use a free external Postgres instead:
#   - Neon       (https://neon.tech)      — 0.5 GB free forever
#   - Supabase   (https://supabase.com)   — 500 MB free forever
#   - Aiven      (https://aiven.io)       — trial credit
# Paste the connection string into the DATABASE_URL env var on Render.
#
# Steps:
#   1. Push this repo to GitHub.
#   2. On Render: New + → Web Service → connect this repo.
#      (Don't use Blueprint — that auto-provisions paid resources.)
#   3. Render auto-detects `render.yaml`. Pick FREE plan when prompted.
#   4. Set the secrets listed under `envVars` (sync: false items).
#   5. Wait for the build to complete. Health check at /api/health.
#
# Required env vars set manually in the Render dashboard:
#   DATABASE_URL    - your Neon/Supabase Postgres connection string
#   LLM_API_KEY     - OpenRouter key (sk-or-v1-...) or direct OpenAI key
#   LLM_BASE_URL    - "https://openrouter.ai/api/v1" for OpenRouter; empty for OpenAI direct
#   LLM_MODEL       - e.g. "meta-llama/llama-3.3-70b-instruct"
#   CORS_ORIGINS    - comma-separated frontend URLs (e.g. "https://nxtcorp.vercel.app")
services:
  - type: web
    name: nxtcorp-api
    runtime: python
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      # Legacy aliases — read only if LLM_* unset. Not required.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_QUESTION_ID
        value: p001_bonus_calculator
      - key: QUESTIONS_DIR
        value: ./questions
