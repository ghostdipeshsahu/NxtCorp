# Render blueprint — deploys the FastAPI backend + a Postgres DB.
# Push this repo to GitHub, then on Render: New +-> Blueprint -> point at the repo.
#
# Required env vars set in the Render dashboard (NOT committed):
#   ANTHROPIC_API_KEY   - your Anthropic key (sk-ant-...) or OpenRouter key (sk-or-v1-...)
#   ANTHROPIC_BASE_URL  - leave empty for direct Anthropic; "https://openrouter.ai/api" for OpenRouter
#   ANTHROPIC_MODEL     - e.g. "claude-sonnet-4-6" or "anthropic/claude-haiku-4.5"
#   JWT_SECRET          - generate with: python -c "import secrets; print(secrets.token_urlsafe(48))"
#   CORS_ORIGINS        - comma-separated list of allowed frontend URLs (e.g. "https://nxtcorp.vercel.app")
services:
  - type: web
    name: nxtcorp-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nxtcorp-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_QUESTION_ID
        value: p001_detect_capital
      - key: QUESTIONS_DIR
        value: ./questions

databases:
  - name: nxtcorp-db
    plan: starter
    databaseName: nxtcorp
    user: nxtcorp
