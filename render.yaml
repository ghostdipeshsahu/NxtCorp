# Render blueprint — deploys the FastAPI backend + a Postgres DB.
# Push this repo to GitHub, then on Render: New + → Blueprint → point at the repo.
#
# Required env vars set in the Render dashboard (NOT committed):
#   LLM_API_KEY     - OpenRouter key (sk-or-v1-...) or direct OpenAI key (sk-...)
#   LLM_BASE_URL    - "https://openrouter.ai/api/v1" for OpenRouter; empty for OpenAI direct
#   LLM_MODEL       - e.g. "meta-llama/llama-3.3-70b-instruct" or "openai/gpt-4o-mini"
#   CORS_ORIGINS    - comma-separated frontend URLs (e.g. "https://nxtcorp.vercel.app")
#   JWT_SECRET      - autogenerated by Render (see envVars below)
services:
  - type: web
    name: nxtcorp-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nxtcorp-db
          property: connectionString
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      # Legacy aliases — read only if LLM_* unset. Not required.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_QUESTION_ID
        value: p001_bonus_calculator
      - key: QUESTIONS_DIR
        value: ./questions

databases:
  - name: nxtcorp-db
    plan: starter
    databaseName: nxtcorp
    user: nxtcorp
